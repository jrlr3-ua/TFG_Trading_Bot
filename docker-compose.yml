version: '3'
services:
  # 1. BOT PRINCIPAL (Freqtrade - FreqAI / LightGBM)
  freqtrade:
    build: .
    restart: always
    container_name: freqtrade_elite_bot
    env_file: .env
    volumes:
      - ./user_data:/freqtrade/user_data
    ports:
      - "8081:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url postgresql://postgres:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      --config /freqtrade/user_data/config.json
      --config /freqtrade/user_data/config_secrets.json
      --strategy FreqaiExampleStrategy
      --freqaimodel LightGBMRegressor
    depends_on:
      - timescaledb
    
  # 2. BOT EXPERIMENTAL (SMC + SCALPING + IA)
  freqtrade_smc:
      build:
        context: .
        dockerfile: Dockerfile.smc
      restart: unless-stopped
      container_name: freqtrade_smc
      env_file: .env
      volumes:
        - "./user_data:/freqtrade/user_data"
      ports:
        - "8082:8080"
      command: >
        trade
        --logfile /freqtrade/user_data/logs/freqtrade_smc.log
        --db-url sqlite:////freqtrade/user_data/trades_smc.sqlite
        --config /freqtrade/user_data/config_smc.json
        --strategy SMC_Scalping_TFG
        --freqaimodel LightGBMRegressor
        
  # 3. MOTOR NLP (FinBERT - Análisis de Sentimiento)
  sentiment_analysis:
    build:
      context: .
      dockerfile: Dockerfile.sentiment
    container_name: sentiment_engine
    restart: always
    env_file: .env
    depends_on:
      - timescaledb
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

  # 4. BASE DE DATOS (TimescaleDB)
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: freqtrade_db
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # 5. VISUALIZACIÓN (Grafana)
  grafana:
    image: grafana/grafana
    container_name: freqtrade_viz
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - timescaledb

volumes:
  db_data: