name: Institutional CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install Linting & Test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest beautifulsoup4 pandas
        
    - name: Lint with Ruff
      run: |
        # Paramos el build si hay errores lógicos muy graves
        ruff check --output-format=github .
        
    - name: Run Pytest Suite
      run: |
        # Mock de freqtrade dependencies for the ci test
        # the tests mock heavy imports internally
        export PYTHONPATH=./
        pytest tests/ -v
