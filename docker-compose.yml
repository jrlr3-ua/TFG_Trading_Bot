# Docker Compose — compatible con Docker Engine 20.10+ (sin campo version requerido)
# Referencia: https://docs.docker.com/compose/compose-file/
services:
  # 1. BOT PRINCIPAL (Freqtrade - FreqAI / LightGBM)
  freqtrade:
    build: .
    restart: always
    container_name: freqtrade_elite_bot
    env_file: .env
    volumes:
      - ./user_data:/freqtrade/user_data
    ports:
      - "8081:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url postgresql://postgres:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}
      --config /freqtrade/user_data/config.json
      --config /freqtrade/user_data/config_secrets.json
      --strategy HybridTradingStrategy
      --freqaimodel LightGBMRegressor
    depends_on:
      - timescaledb
    
  # 2. MOTOR NLP (FinBERT - Análisis de Sentimiento)
  sentiment_analysis:
    build:
      context: .
      dockerfile: Dockerfile.sentiment
    container_name: sentiment_engine
    restart: always
    env_file: .env
    depends_on:
      - timescaledb
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

  # 3. BASE DE DATOS (TimescaleDB)
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: freqtrade_db
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 20s
      timeout: 10s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  # 4. VISUALIZACIÓN (Grafana)
  grafana:
    image: grafana/grafana
    container_name: freqtrade_viz
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - timescaledb

  # 5. MOTOR ON-CHAIN & MACRO (Fear & Greed, BTC Dominance)
  onchain_data:
    build:
      context: .
      dockerfile: Dockerfile.onchain
    container_name: onchain_engine
    restart: always
    env_file: .env
    depends_on:
      - timescaledb
    environment:
      - PYTHONUNBUFFERED=1
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

  # 6. MLOPS (Tensorboard en Vivo)
  tensorboard:
    image: tensorflow/tensorflow:2.15.0
    platform: linux/amd64
    container_name: mlops_tensorboard
    restart: unless-stopped
    ports:
      - "6006:6006"
    volumes:
      - ./user_data/models:/opt/tensorboard
    command: tensorboard --logdir /opt/tensorboard --host 0.0.0.0 --port 6006

volumes:
  db_data:
  grafana_data: